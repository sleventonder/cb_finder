<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>B737 Aircraft CB Finder - Global Library</title>
    <style>
        :root { --neon: #00ff41; --bg: #0d0d0d; --card: #1a1a1a; --error: #ff3333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Navbar */
        .navbar { background: var(--card); padding: 15px 25px; display: flex; gap: 20px; align-items: center; border-bottom: 2px solid #333; flex-shrink: 0; }
        .logo { color: var(--neon); font-weight: bold; font-size: 1.2rem; letter-spacing: 2px; }
        select, input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0,255,65,0.2); }

        .main-content { display: flex; flex: 1; overflow: hidden; }

        /* Yan Panel (Arama Sonuçları) */
        .sidebar { width: 320px; background: #151515; border-right: 1px solid #333; overflow-y: auto; padding: 15px; transition: 0.3s; }
        .result-item { background: #222; padding: 15px; margin-bottom: 12px; border-radius: 8px; cursor: pointer; border-left: 4px solid transparent; transition: 0.2s; }
        .result-item:hover { background: #2a2a2a; border-left-color: var(--neon); transform: translateX(5px); }
        .res-panel-tag { font-size: 0.7rem; color: var(--neon); font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .res-text { font-size: 0.95rem; font-weight: 500; }

        /* Görüntüleyici Bölgesi */
        .viewer { flex: 1; overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 30px; background: radial-gradient(circle, #1a1a1a 0%, #050505 100%); }
        .panel-wrap { position: relative; border: 2px solid #444; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        #panel-img { display: block; max-height: 82vh; width: auto; }

        /* Kırmızı Daire (Marker) */
        .marker { position: absolute; border: 3px solid var(--error); border-radius: 50%; width: 60px; height: 60px; transform: translate(-50%, -50%); box-shadow: 0 0 20px var(--error), inset 0 0 10px var(--error); pointer-events: none; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.7; } }

        .status-panel { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.85); padding: 12px 20px; border-radius: 6px; border-left: 4px solid var(--neon); font-size: 0.9rem; z-index: 100; }
    </style>
</head>

    <div class="logo">AIRCRAFT CB FINDER</div>

    const panelSelect = document.getElementById('panelSelect');
    const searchBox = document.getElementById('searchBox');
    const resultsList = document.getElementById('resultsList');
    const panelImg = document.getElementById('panel-img');
    const container = document.getElementById('container');
    const status = document.getElementById('status');

    // Paneli ve Kırmızı Halkayı Yükleyen Fonksiyon
    function navigateToCB(panelKey, cbText, x, y) {
        panelSelect.value = panelKey;
        panelImg.src = `paneller/${panelKey}.PNG`;
        panelImg.style.display = 'block';

        // Resim yüklenirken hafif bir gecikme ile marker'ı yerleştir
        setTimeout(() => {
            clearMarkers();
            const marker = document.createElement('div');
            marker.className = 'marker';
            marker.style.left = x + "%";
            marker.style.top = y + "%";
            container.appendChild(marker);
            
            status.innerHTML = `<strong>${panelKey.toUpperCase()}</strong>: ${cbText} işaretlendi.`;
            marker.scrollIntoView({ behavior: "smooth", block: "center" });
        }, 150);
    }

    // Arama Motoru (Tüm panelleri gezer)
  // Arama Motoru (Tüm panelleri gezer)
    searchBox.addEventListener('input', (e) => {
        const query = e.target.value.trim().toUpperCase();
        resultsList.innerHTML = "";
        
        // --- DEĞİŞİKLİK BURADA BAŞLIYOR ---
        // Arama silinirse veya 2 karakterden azsa her şeyi temizle
        if (query.length < 2) {
            clearMarkers(); // Kırmızı halkayı siler ⭕✨
            resultsList.innerHTML = '<p style="color: #444; font-size: 0.85rem;">En az 2 karakter girin.</p>';
            status.innerText = "Arama temizlendi.";
            return;
        }
        // --- DEĞİŞİKLİK BURADA BİTİYOR ---

        let totalMatches = 0;

        for (const panelID in allPanelsData) {
           const matches = allPanelsData[panelID].filter(cb => 
    cb.text.toLowerCase().includes(query.toLowerCase())
);
            
            matches.forEach(cb => {
                totalMatches++;
                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <span class="res-panel-tag">${panelID.replace('_', '-')}</span>
                    <div class="res-text">${cb.text}</div>
                `;
                item.onclick = () => navigateToCB(panelID, cb.text, cb.x, cb.y);
                resultsList.appendChild(item);
            });
        }

        status.innerText = `${totalMatches} sonuç bulundu.`;
        if (totalMatches === 0) resultsList.innerHTML = '<p style="color: #666;">Eşleşme bulunamadı.</p>';
    });

    panelSelect.addEventListener('change', (e) => {
        const key = e.target.value;
        if (!key) return;
        panelImg.src = `paneller/${key}.PNG`;
        panelImg.style.display = 'block';
        clearMarkers();
        status.innerText = `${key} paneli yüklendi.`;
    });

    function clearMarkers() {
        document.querySelectorAll('.marker').forEach(m => m.remove());
    }
</script>
